name: Build and Create Prerelease
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build (skip tests)
        run: mvn -B -DskipTests package

      - name: Get project version
        id: version
        run: |
          VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive org.codehaus.mojo:exec-maven-plugin:3.1.0:exec)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Normalize release tag
        id: tag
        run: |
          RAW_VERSION=${{ steps.version.outputs.version }}
          if [[ "$RAW_VERSION" == *"SNAPSHOT" ]]; then
            # replace SNAPSHOT with run number
            TAG_VERSION=${RAW_VERSION/SNAPSHOT/prerelease-${GITHUB_RUN_NUMBER}}
          else
            TAG_VERSION=${RAW_VERSION}-${GITHUB_RUN_NUMBER}
          fi
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub prerelease
        id: create_pr
        uses: actions/create-release@v4
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          release_name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload jar artifact
        uses: actions/upload-release-asset@v2
        with:
          upload_url: ${{ steps.create_pr.outputs.upload_url }}
          asset_path: $(ls target/*.jar | head -n 1)
          asset_name: $(basename $(ls target/*.jar | head -n 1))
          asset_content_type: application/java-archive

